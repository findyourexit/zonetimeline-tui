name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Tests With Coverage
        run: cargo llvm-cov --no-report

      - name: Generate Coverage Summary
        run: |
          cargo llvm-cov report 2>&1 | tee coverage.txt

          {
            awk '
              /^Filename/ { found=1; next }
              /^---/ { next }
              found && NF > 0 {
                file=$1; lines=$8; missed=$9; cover=$10
                if (file == "TOTAL") {
                  total=cover
                  rows[n++] = sprintf("| **%s** | **%s** | **%s** | **%s** |", file, lines, missed, cover)
                } else {
                  rows[n++] = sprintf("| `%s` | %s | %s | %s |", file, lines, missed, cover)
                }
              }
              END {
                print "## Test Coverage"
                print ""
                printf "**Overall line coverage: %s**\n\n", total
                print "| File | Lines | Missed | Coverage |"
                print "|------|------:|-------:|---------:|"
                for (i=0; i<n; i++) print rows[i]
              }
            ' coverage.txt
          } >> "$GITHUB_STEP_SUMMARY"

  platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Test
        run: cargo test
