name: Bug Report
description: Report a bug or unexpected behaviour in ztl
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `ztl ...`
        2. Press '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Output Mode
      description: Which output mode were you using?
      options:
        - Interactive TUI (default)
        - Plain text (--plain)
        - List subcommand (list)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15.1, Ubuntu 24.04, Windows 11
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal Emulator
      placeholder: e.g. Ghostty, iTerm2, Alacritty, Windows Terminal
    validations:
      required: false

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: e.g. rustc 1.82.0 (f6e511eec 2024-10-15)
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or config snippets that might help.
    validations:
      required: false
